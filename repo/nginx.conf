server {
    listen 80;
    listen [::]:80;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # The feed is a plain JSON index; the device parses it with strstr anchors.
    location = /feed.json {
        default_type application/json;
        add_header Cache-Control "no-cache";
    }

    # .zmod packages are standard ZIP; serve as binary downloads, never gzipped
    # (the device streams the body straight to flash and verifies its sha256).
    location /mods/ {
        types { }
        default_type application/octet-stream;
        gzip off;
    }

    location / {
        try_files $uri =404;
    }

    gzip on;
    gzip_types application/json;
    gzip_min_length 1024;
}